<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Лабораторная система</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 500px; margin: 0 auto; }
        .card { background: white; border-radius: 25px; padding: 20px; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 50px; font-size: 16px; font-weight: bold; cursor: pointer; margin-bottom: 10px; }
        .btn-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        .btn-success { background: #2ecc71; color: white; }
        .btn-danger { background: #e74c3c; color: white; }
        .field { margin-bottom: 15px; }
        .field label { display: block; margin-bottom: 5px; font-weight: bold; color: #2c3e50; }
        .field input, .field select, .field textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; font-size: 16px; }
        .hidden { display: none; }
        .error { color: #e74c3c; text-align: center; margin-top: 10px; }
        .success { color: #2ecc71; text-align: center; margin-top: 10px; }
        .logo { text-align: center; margin-bottom: 20px; }
        .logo .icon { font-size: 64px; }
        .employee-card { background: #f8f9fa; border-radius: 15px; padding: 12px; margin-bottom: 12px; }
        task-card { background: #fff8e1; border-radius: 10px; padding: 10px; margin-bottom: 10px; }
        .petri-card { background: #e8f8f5; padding: 10px; border-radius: 10px; margin-bottom: 10px; }
        .flex-between { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .mb-2 { margin-bottom: 10px; }
    </style>
</head>
<body>
<div class="container">
    <div class="logo"><div class="icon">⚕️</div><h1>Лабораторная система</h1><p>Медицинская информационная система</p></div>

    <div id="authMenu" class="card">
        <button class="btn btn-primary" onclick="showLogin()">🔐 Вход</button>
        <button class="btn btn-success" onclick="showRegister()">📝 Регистрация</button>
    </div>

    <div id="loginForm" class="card hidden">
        <h2>🔐 Вход</h2>
        <div class="field"><label>Пароль лаборатории:</label><input type="password" id="loginLab"></div>
        <div class="field"><label>ФИО:</label><input type="text" id="loginName"></div>
        <div class="field"><label>Пароль:</label><input type="password" id="loginPass"></div>
        <button class="btn btn-primary" onclick="doLogin()">Войти</button>
        <button class="btn" onclick="showMainMenu()">Назад</button>
        <div id="loginError" class="error"></div>
    </div>

    <div id="registerForm" class="card hidden">
        <h2>📝 Регистрация</h2>
        <div class="field"><label>Должность:</label><select id="regRole"><option value="employee">Работник</option><option value="admin">Руководитель</option></select></div>
        <div id="adminFields"><div class="field"><label>Пароль лаборатории (создать):</label><input type="text" id="regLabPass"></div></div>
        <div id="empFields" class="hidden"><div class="field"><label>Пароль лаборатории (от руководителя):</label><input type="password" id="regLabPassEmp"></div></div>
        <div class="field"><label>ФИО:</label><input type="text" id="regName"></div>
        <div class="field"><label>Пароль:</label><input type="password" id="regPass"></div>
        <button class="btn btn-success" onclick="doRegister()">Зарегистрироваться</button>
        <button class="btn" onclick="showMainMenu()">Назад</button>
        <div id="regError" class="error"></div>
        <div id="regSuccess" class="success"></div>
    </div>

    <div id="adminPanel" class="card hidden">
        <div class="flex-between"><h2>👨‍⚕️ Панель руководителя</h2><button class="btn btn-danger" onclick="logout()" style="width:auto">Выйти</button></div>
        <div id="adminUserInfo" class="mb-2"></div>
        <div class="field"><label>➕ Добавить сотрудника</label><input type="text" id="newEmpName"></div>
        <button class="btn btn-success" onclick="addEmployee()">Добавить</button>
        <div id="addMsg" class="success"></div>
        <h3>📋 Сотрудники</h3>
        <div id="employeesList"></div>
    </div>

    <div id="employeePanel" class="card hidden">
        <div class="flex-between"><h2>👩‍🔬 Панель работника</h2><button class="btn btn-danger" onclick="logout()" style="width:auto">Выйти</button></div>
        <div id="employeeUserInfo" class="mb-2"></div>
        <div class="field"><textarea id="petriContent" rows="3" placeholder="Опишите чашку Петри... ✍️ Можно стилусом"></textarea></div>
        <button class="btn btn-success" onclick="savePetri()">💾 Сохранить чашку Петри</button>
        <div id="petriList" style="margin-top:15px;"></div>
        <h3>📋 Поручения от руководителя</h3>
        <div id="tasksList"></div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const supabaseUrl = 'https://labsystem-8b93c.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxhYnN5c3RlbS04YjkzYyIsInJvbGUiOiJhbm9uIiwiaWF0IjoxNzQ2MjU5MjUwLCJleHAiOjIwNjE4MzUyNTB9.V0uZvYePdWwtVlWQokHtmBPvQ_dnkgBkZqOAXK-n4QI';
    const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);
    let currentUser = null;

    function showMainMenu() {
        document.getElementById('authMenu').classList.remove('hidden');
        document.getElementById('loginForm').classList.add('hidden');
        document.getElementById('registerForm').classList.add('hidden');
        document.getElementById('adminPanel').classList.add('hidden');
        document.getElementById('employeePanel').classList.add('hidden');
    }

    function showLogin() {
        document.getElementById('authMenu').classList.add('hidden');
        document.getElementById('loginForm').classList.remove('hidden');
        document.getElementById('loginError').innerHTML = '';
    }

    function showRegister() {
        document.getElementById('authMenu').classList.add('hidden');
        document.getElementById('registerForm').classList.remove('hidden');
        document.getElementById('regError').innerHTML = '';
        document.getElementById('regSuccess').innerHTML = '';
        let role = document.getElementById('regRole').value;
        document.getElementById('adminFields').classList.toggle('hidden', role !== 'admin');
        document.getElementById('empFields').classList.toggle('hidden', role !== 'employee');
    }

    document.getElementById('regRole').onchange = function() {
        let role = this.value;
        document.getElementById('adminFields').classList.toggle('hidden', role !== 'admin');
        document.getElementById('empFields').classList.toggle('hidden', role !== 'employee');
    };

    async function doRegister() {
        let role = document.getElementById('regRole').value;
        let name = document.getElementById('regName').value.trim();
        let pass = document.getElementById('regPass').value;
        if (!name || !pass) { document.getElementById('regError').innerHTML = 'Заполните поля'; return; }
        if (pass.length < 3) { document.getElementById('regError').innerHTML = 'Пароль минимум 3 символа'; return; }

        if (role === 'admin') {
            let labPass = document.getElementById('regLabPass').value.trim();
            if (!labPass) { document.getElementById('regError').innerHTML = 'Придумайте пароль лаборатории'; return; }
            let { data: lab } = await supabase.from('labs').select().eq('lab_password', labPass);
            if (lab?.length) { document.getElementById('regError').innerHTML = 'Лаборатория уже есть'; return; }
            await supabase.from('labs').insert([{ lab_password: labPass, created_by: name }]);
            let userId = crypto.randomUUID();
            await supabase.from('users').insert([{ id: userId, fullname: name, password: pass, role: 'admin', lab_password: labPass }]);
            document.getElementById('regSuccess').innerHTML = '✅ Лаборатория создана! Войдите.';
            setTimeout(showMainMenu, 2000);
        } else {
            let labPass = document.getElementById('regLabPassEmp').value;
            if (!labPass) { document.getElementById('regError').innerHTML = 'Введите пароль лаборатории'; return; }
            let { data: lab } = await supabase.from('labs').select().eq('lab_password', labPass);
            if (!lab?.length) { document.getElementById('regError').innerHTML = 'Лаборатория не найдена'; return; }
            let { data: user } = await supabase.from('users').select().eq('fullname', name);
            if (user?.length) { document.getElementById('regError').innerHTML = 'Пользователь уже есть'; return; }
            let userId = crypto.randomUUID();
            await supabase.from('users').insert([{ id: userId, fullname: name, password: pass, role: 'employee', lab_password: labPass }]);
            document.getElementById('regSuccess').innerHTML = '✅ Регистрация успешна! Войдите.';
            setTimeout(showMainMenu, 2000);
        }
    }

    async function doLogin() {
        let lab = document.getElementById('loginLab').value;
        let name = document.getElementById('loginName').value.trim();
        let pass = document.getElementById('loginPass').value;
        let { data: users } = await supabase.from('users').select().eq('lab_password', lab).eq('fullname', name).eq('password', pass);
        if (!users?.length) { document.getElementById('loginError').innerHTML = 'Неверные данные'; return; }
        currentUser = users[0];
        localStorage.setItem('currentUser', JSON.stringify(currentUser));
        if (currentUser.role === 'admin') {
            document.getElementById('adminUserInfo').innerHTML = `👨‍⚕️ ${currentUser.fullname} | 🔑 ${currentUser.lab_password}`;
            document.getElementById('adminPanel').classList.remove('hidden');
            document.getElementById('authMenu').classList.add('hidden');
            loadEmployees();
        } else {
            document.getElementById('employeeUserInfo').innerHTML = `👩‍🔬 ${currentUser.fullname} | 🔑 ${currentUser.lab_password}`;
            document.getElementById('employeePanel').classList.remove('hidden');
            document.getElementById('authMenu').classList.add('hidden');
            loadEmployeePetri();
            loadEmployeeTasks();
        }
    }

    async function loadEmployees() {
        let { data: users } = await supabase.from('users').select().eq('lab_password', currentUser.lab_password).eq('role', 'employee');
        let container = document.getElementById('employeesList');
        container.innerHTML = '';
        if (!users?.length) { container.innerHTML = '<p>Нет сотрудников</p>'; return; }
        for (let user of users) {
            let { data: petri } = await supabase.from('petri').select().eq('employee_id', user.id);
            let div = document.createElement('div');
            div.className = 'employee-card';
            div.innerHTML = `<div class="flex-between"><strong>${user.fullname}</strong><button class="btn btn-primary" style="width:auto; padding:5px 12px;" onclick="showTaskModal('${user.id}')">📝 Дать поручение</button></div>`;
            if (petri?.length) {
                div.innerHTML += `<div><strong>Чашки Петри:</strong>`;
                for (let p of petri) div.innerHTML += `<div class="petri-card">📄 ${p.content}<br><small>${new Date(p.created_at).toLocaleString()}</small></div>`;
                div.innerHTML += `</div>`;
            }
            container.appendChild(div);
        }
    }

    async function addEmployee() {
        let name = document.getElementById('newEmpName').value.trim();
        if (!name) return;
        let userId = crypto.randomUUID();
        await supabase.from('users').insert([{ id: userId, fullname: name, password: '', role: 'employee', lab_password: currentUser.lab_password }]);
        document.getElementById('newEmpName').value = '';
        document.getElementById('addMsg').innerHTML = '✅ Добавлен';
        setTimeout(() => document.getElementById('addMsg').innerHTML = '', 1500);
        loadEmployees();
    }

    function showTaskModal(empId) {
        let modal = document.createElement('div');
        modal.style.position = 'fixed'; modal.style.top = 0; modal.style.left = 0; modal.style.width = '100%'; modal.style.height = '100%';
        modal.style.background = 'rgba(0,0,0,0.5)'; modal.style.display = 'flex'; modal.style.justifyContent = 'center'; modal.style.alignItems = 'center'; modal.style.zIndex = 1000;
        modal.innerHTML = `<div style="background:white; border-radius:20px; padding:20px; width:90%; max-width:350px;"><h3>📝 Поручение</h3><textarea id="taskTitle" rows="3" style="width:100%; padding:10px;"></textarea><div style="display:flex; gap:10px; margin-top:10px;"><button onclick="sendTask('${empId}')" class="btn btn-success">Отправить</button><button onclick="closeModal()" class="btn">Отмена</button></div></div>`;
        document.body.appendChild(modal);
    }
    function closeModal() { let m = document.querySelector('div[style*="z-index: 1000"]'); if (m) m.remove(); }
    async function sendTask(empId) {
        let title = document.getElementById('taskTitle').value.trim();
        if (!title) return;
        await supabase.from('tasks').insert([{ id: crypto.randomUUID(), employee_id: empId, title: title, from_user: currentUser.fullname, status: 'pending', created_at: new Date().toISOString() }]);
        closeModal();
        alert('Поручение отправлено');
    }

    async function loadEmployeePetri() {
        let { data: petri } = await supabase.from('petri').select().eq('employee_id', currentUser.id);
        let container = document.getElementById('petriList');
        container.innerHTML = '';
        if (!petri?.length) { container.innerHTML = '<p>Нет чашек Петри</p>'; return; }
        for (let p of petri) container.innerHTML += `<div class="petri-card">📄 ${p.content}<br><small>${new Date(p.created_at).toLocaleString()}</small></div>`;
    }

    async function savePetri() {
        let content = document.getElementById('petriContent').value.trim();
        if (!content) return;
        await supabase.from('petri').insert([{ id: crypto.randomUUID(), employee_id: currentUser.id, content: content, created_at: new Date().toISOString() }]);
        document.getElementById('petriContent').value = '';
        loadEmployeePetri();
        alert('Сохранено');
    }

    async function loadEmployeeTasks() {
        let { data: tasks } = await supabase.from('tasks').select().eq('employee_id', currentUser.id);
        let container = document.getElementById('tasksList');
        container.innerHTML = '';
        if (!tasks?.length) { container.innerHTML = '<p>Нет поручений</p>'; return; }
        for (let task of tasks) {
            let answerHtml = task.answer ? `<div><strong>Ответ:</strong> ${task.answer}</div>` :
                `<textarea id="ans_${task.id}" rows="2" style="width:100%; margin-top:8px; padding:8px;"></textarea>
                 <button class="btn btn-primary" style="margin-top:5px; width:auto; padding:5px 12px;" onclick="sendAnswer('${task.id}')">📤 Ответить</button>`;
            container.innerHTML += `<div class="card" style="margin-bottom:10px;"><strong>${task.title}</strong><div>От: ${task.from_user}</div><div>${new Date(task.created_at).toLocaleString()}</div>${answerHtml}</div>`;
        }
    }

    async function sendAnswer(taskId) {
        let answer = document.getElementById(`ans_${taskId}`).value.trim();
        if (!answer) return;
        await supabase.from('tasks').update({ answer: answer, status: 'completed', answered_at: new Date().toISOString() }).eq('id', taskId);
        loadEmployeeTasks();
        alert('Ответ отправлен');
    }

    function logout() { localStorage.removeItem('currentUser'); currentUser = null; showMainMenu(); }

    let saved = localStorage.getItem('currentUser');
    if (saved) {
        currentUser = JSON.parse(saved);
        if (currentUser.role === 'admin') {
            document.getElementById('adminUserInfo').innerHTML = `👨‍⚕️ ${currentUser.fullname} | 🔑 ${currentUser.lab_password}`;
            document.getElementById('adminPanel').classList.remove('hidden');
            document.getElementById('authMenu').classList.add('hidden');
            loadEmployees();
        } else {
            document.getElementById('employeeUserInfo').innerHTML = `👩‍🔬 ${currentUser.fullname} | 🔑 ${currentUser.lab_password}`;
            document.getElementById('employeePanel').classList.remove('hidden');
            document.getElementById('authMenu').classList.add('hidden');
            loadEmployeePetri();
            loadEmployeeTasks();
        }
    }

    window.showMainMenu = showMainMenu;
    window.showLogin = showLogin;
    window.showRegister = showRegister;
    window.doLogin = doLogin;
    window.doRegister = doRegister;
    window.addEmployee = addEmployee;
    window.showTaskModal = showTaskModal;
    window.sendTask = sendTask;
    window.savePetri = savePetri;
    window.sendAnswer = sendAnswer;
    window.logout = logout;
</script>
</body>
</html>
