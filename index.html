<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Лабораторная система</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 500px; margin: 0 auto; }
        .card { background: white; border-radius: 25px; padding: 35px; margin-bottom: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.2); }
        .btn { width: 100%; padding: 16px; border: none; border-radius: 50px; font-size: 18px; font-weight: bold; cursor: pointer; margin-bottom: 12px; }
        .btn-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        .btn-success { background: #2ecc71; color: white; }
        .field { margin-bottom: 20px; }
        .field label { display: block; margin-bottom: 8px; font-weight: bold; color: #2c3e50; }
        .field input, .field select, .field textarea { width: 100%; padding: 14px; border: 1px solid #ddd; border-radius: 12px; font-size: 16px; }
        .hidden { display: none; }
        .error { color: #e74c3c; text-align: center; margin-top: 15px; }
        .success { color: #2ecc71; text-align: center; margin-top: 15px; }
        .logo { text-align: center; margin-bottom: 40px; }
        .logo .icon { font-size: 80px; background: rgba(255,255,255,0.2); width: 120px; height: 120px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; }
        .logo h1 { color: white; font-size: 32px; }
        .logo p { color: rgba(255,255,255,0.8); font-size: 16px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <div class="icon">⚕️</div>
            <h1>Лабораторная система</h1>
            <p>Медицинская информационная система</p>
        </div>
        
        <div id="mainMenu" class="card">
            <button class="btn btn-primary" onclick="showLogin()">🔐 Вход</button>
            <button class="btn btn-success" onclick="showRegister()">📝 Регистрация</button>
        </div>
        
        <div id="loginForm" class="card hidden">
            <h2 style="text-align:center;">🔐 Вход</h2>
            <div class="field"><label>Пароль лаборатории:</label><input type="password" id="loginLabPass" placeholder="Пароль лаборатории"></div>
            <div class="field"><label>ФИО:</label><input type="text" id="loginName" placeholder="Иванов Иван"></div>
            <div class="field"><label>Пароль:</label><input type="password" id="loginPass"></div>
            <button class="btn btn-primary" onclick="doLogin()">Войти</button>
            <button class="btn" onclick="showMainMenu()" style="background:#95a5a6; color:white;">Назад</button>
            <div id="loginError" class="error"></div>
        </div>
        
        <div id="registerForm" class="card hidden">
            <h2>📝 Регистрация</h2>
            <div class="field"><label>Должность:</label><select id="regRole" onchange="toggleRegFields()"><option value="employee">Работник</option><option value="admin">Руководитель</option></select></div>
            <div id="regAdminField"><div class="field"><label>Создать пароль лаборатории:</label><input type="text" id="regLabPass" placeholder="Придумайте пароль"></div></div>
            <div id="regEmployeeField" class="hidden"><div class="field"><label>Пароль лаборатории:</label><input type="password" id="regLabPassEmployee" placeholder="Введите пароль"></div></div>
            <div class="field"><label>ФИО:</label><input type="text" id="regName" placeholder="Иванов Иван"></div>
            <div class="field"><label>Пароль:</label><input type="password" id="regPass"></div>
            <button class="btn btn-success" onclick="doRegister()">Зарегистрироваться</button>
            <button class="btn" onclick="showMainMenu()" style="background:#95a5a6; color:white;">Назад</button>
            <div id="regError" class="error"></div>
            <div id="regSuccess" class="success"></div>
        </div>
        
        <div id="adminPanel" class="card hidden">
            <h2>👨‍⚕️ Панель руководителя</h2>
            <div id="adminName" style="text-align:center; margin-bottom:15px;"></div>
            <div class="field"><label>ФИО сотрудника:</label><input type="text" id="empName" placeholder="Иванов Иван"></div>
            <button class="btn btn-success" onclick="addEmployee()">➕ Добавить сотрудника</button>
            <div id="employeesList" style="margin-top:15px;"></div>
            <button class="btn" onclick="logout()" style="background:#95a5a6; color:white; margin-top:15px;">🚪 Выйти</button>
        </div>
        
        <div id="employeePanel" class="card hidden">
            <h2>👩‍🔬 Панель работника</h2>
            <div id="employeeName" style="text-align:center; margin-bottom:15px;"></div>
            <div class="field"><textarea id="petriInput" rows="3" placeholder="Введите описание чашки Петри... ✍️ Можно писать стилусом"></textarea></div>
            <button class="btn btn-success" onclick="savePetri()">💾 Сохранить чашку Петри</button>
            <div id="petriList" style="margin-top:15px;"></div>
            <button class="btn" onclick="logout()" style="background:#95a5a6; color:white; margin-top:15px;">🚪 Выйти</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // ========== SUPABASE (ТВОИ КЛЮЧИ) ==========
        const supabaseUrl = 'https://labsystem-8b93c.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxhYnN5c3RlbS04YjkzYyIsInJvbGUiOiJhbm9uIiwiaWF0IjoxNzQ2MjU5MjUwLCJleHAiOjIwNjE4MzUyNTB9.V0uZvYePdWwtVlWQokHtmBPvQ_dnkgBkZqOAXK-n4QI';
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);
        
        let currentUser = null;
        let currentLab = null;
        
        function showMainMenu() {
            document.getElementById('mainMenu').classList.remove('hidden');
            document.getElementById('loginForm').classList.add('hidden');
            document.getElementById('registerForm').classList.add('hidden');
            document.getElementById('adminPanel').classList.add('hidden');
            document.getElementById('employeePanel').classList.add('hidden');
        }
        
        function showLogin() {
            document.getElementById('mainMenu').classList.add('hidden');
            document.getElementById('loginForm').classList.remove('hidden');
            document.getElementById('loginError').innerHTML = '';
            document.getElementById('loginLabPass').value = '';
            document.getElementById('loginName').value = '';
            document.getElementById('loginPass').value = '';
        }
        
        function showRegister() {
            document.getElementById('mainMenu').classList.add('hidden');
            document.getElementById('registerForm').classList.remove('hidden');
            toggleRegFields();
            document.getElementById('regError').innerHTML = '';
            document.getElementById('regSuccess').innerHTML = '';
        }
        
        function toggleRegFields() {
            let role = document.getElementById('regRole').value;
            if (role === 'admin') {
                document.getElementById('regAdminField').classList.remove('hidden');
                document.getElementById('regEmployeeField').classList.add('hidden');
            } else {
                document.getElementById('regAdminField').classList.add('hidden');
                document.getElementById('regEmployeeField').classList.remove('hidden');
            }
        }
        
        async function doRegister() {
            let role = document.getElementById('regRole').value;
            let name = document.getElementById('regName').value.trim();
            let pass = document.getElementById('regPass').value;
            
            if (!name || !pass) { showRegError('Заполните все поля'); return; }
            if (pass.length < 3) { showRegError('Пароль минимум 3 символа'); return; }
            
            if (role === 'admin') {
                let labPass = document.getElementById('regLabPass').value.trim();
                if (!labPass) { showRegError('Создайте пароль лаборатории'); return; }
                if (labPass.length < 3) { showRegError('Пароль лаборатории минимум 3 символа'); return; }
                
                let { data: existing } = await supabase.from('labs').select().eq('lab_password', labPass);
                if (existing && existing.length > 0) { showRegError('Лаборатория уже создана'); return; }
                
                await supabase.from('labs').insert([{ lab_password: labPass, created_by: name }]);
                
                let userId = crypto.randomUUID();
                await supabase.from('users').insert([{
                    id: userId,
                    fullname: name,
                    password: pass,
                    role: 'admin',
                    lab_password: labPass
                }]);
                
                document.getElementById('regSuccess').innerHTML = '✅ Лаборатория создана! Войдите.';
                setTimeout(showMainMenu, 2000);
            } else {
                let labPass = document.getElementById('regLabPassEmployee').value;
                if (!labPass) { showRegError('Введите пароль лаборатории'); return; }
                
                let { data: lab } = await supabase.from('labs').select().eq('lab_password', labPass);
                if (!lab || lab.length === 0) { showRegError('Лаборатория не найдена'); return; }
                
                let { data: existingUser } = await supabase.from('users').select().eq('fullname', name);
                if (existingUser && existingUser.length > 0) { showRegError('Пользователь уже существует'); return; }
                
                let userId = crypto.randomUUID();
                await supabase.from('users').insert([{
                    id: userId,
                    fullname: name,
                    password: pass,
                    role: 'employee',
                    lab_password: labPass
                }]);
                
                document.getElementById('regSuccess').innerHTML = '✅ Регистрация успешна! Войдите.';
                setTimeout(showMainMenu, 2000);
            }
        }
        
        function showRegError(msg) {
            document.getElementById('regError').innerHTML = msg;
            document.getElementById('regSuccess').innerHTML = '';
        }
        
        async function doLogin() {
            let labPass = document.getElementById('loginLabPass').value;
            let name = document.getElementById('loginName').value.trim();
            let pass = document.getElementById('loginPass').value;
            
            let { data: user, error } = await supabase
                .from('users')
                .select()
                .eq('lab_password', labPass)
                .eq('fullname', name)
                .eq('password', pass);
            
            if (!user || user.length === 0) {
                document.getElementById('loginError').innerHTML = 'Неверные данные';
                return;
            }
            
            currentUser = user[0];
            currentLab = labPass;
            localStorage.setItem('currentUser', JSON.stringify(currentUser));
            
            if (currentUser.role === 'admin') {
                document.getElementById('adminName').innerHTML = `👨‍⚕️ ${currentUser.fullname} | 🔑 ${currentLab}`;
                document.getElementById('adminPanel').classList.remove('hidden');
                document.getElementById('mainMenu').classList.add('hidden');
                loadEmployees();
            } else {
                document.getElementById('employeeName').innerHTML = `👩‍🔬 ${currentUser.fullname} | 🔑 ${currentLab}`;
                document.getElementById('employeePanel').classList.remove('hidden');
                document.getElementById('mainMenu').classList.add('hidden');
                loadEmployeePetri();
            }
        }
        
        async function loadEmployees() {
            let { data: users } = await supabase
                .from('users')
                .select()
                .eq('lab_password', currentLab)
                .eq('role', 'employee');
            
            let container = document.getElementById('employeesList');
            container.innerHTML = '';
            
            if (!users || users.length === 0) {
                container.innerHTML = '<p>Нет сотрудников</p>';
                return;
            }
            
            for (let user of users) {
                let div = document.createElement('div');
                div.className = 'card';
                div.style.padding = '15px';
                div.style.marginBottom = '10px';
                div.innerHTML = `
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <span><strong>${user.fullname}</strong></span>
                        <button class="btn btn-primary" style="padding:8px 16px; width:auto;" onclick='showTaskModal("${user.id}", "${user.fullname}")'>📝 Дать поручение</button>
                    </div>
                    <div id="petriFor_${user.id}" style="margin-top:10px; font-size:12px; color:#666;"></div>
                `;
                container.appendChild(div);
                
                let { data: petri } = await supabase.from('petri').select().eq('employee_id', user.id);
                let petriDiv = document.getElementById(`petriFor_${user.id}`);
                if (petri && petri.length > 0) {
                    petriDiv.innerHTML = '<strong>Чашки Петри:</strong><br>';
                    for (let p of petri) {
                        petriDiv.innerHTML += `📄 ${p.content}<br><small>${new Date(p.created_at).toLocaleString()}</small><br>`;
                    }
                }
            }
        }
        
        async function addEmployee() {
            let name = document.getElementById('empName').value.trim();
            if (!name) { alert('Введите ФИО'); return; }
            
            let { data: existing } = await supabase.from('users').select().eq('fullname', name).eq('lab_password', currentLab);
            if (existing && existing.length > 0) { alert('Сотрудник уже добавлен'); return; }
            
            let userId = crypto.randomUUID();
            await supabase.from('users').insert([{
                id: userId,
                fullname: name,
                password: '',
                role: 'employee',
                lab_password: currentLab
            }]);
            
            document.getElementById('empName').value = '';
            alert('✅ Сотрудник добавлен');
            loadEmployees();
        }
        
        function showTaskModal(empId, empName) {
            let modal = document.createElement('div');
            modal.style.position = 'fixed';
            modal.style.top = '0';
            modal.style.left = '0';
            modal.style.width = '100%';
            modal.style.height = '100%';
            modal.style.background = 'rgba(0,0,0,0.5)';
            modal.style.display = 'flex';
            modal.style.justifyContent = 'center';
            modal.style.alignItems = 'center';
            modal.style.zIndex = '1000';
            modal.innerHTML = `
                <div style="background:white; border-radius:20px; padding:25px; width:90%; max-width:400px;">
                    <h3>📝 Дать поручение</h3>
                    <p>Сотрудник: <strong>${empName}</strong></p>
                    <textarea id="taskTitle" rows="3" style="width:100%; padding:12px; margin:15px 0; border:1px solid #ddd; border-radius:10px;" placeholder="Введите поручение..."></textarea>
                    <div style="display:flex; gap:10px; margin-top:10px;">
                        <button onclick='sendTask("${empId}")' class="btn btn-success" style="padding:10px 20px;">Отправить</button>
                        <button onclick="closeModal()" class="btn" style="background:#95a5a6; padding:10px 20px;">Отмена</button>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
        }
        
        function closeModal() {
            let modal = document.querySelector('div[style*="z-index: 1000"]');
            if (modal) modal.remove();
        }
        
        async function sendTask(empId) {
            let title = document.getElementById('taskTitle').value.trim();
            if (!title) { alert('Введите поручение'); return; }
            
            let taskId = crypto.randomUUID();
            await supabase.from('tasks').insert([{
                id: taskId,
                employee_id: empId,
                title: title,
                from_user: currentUser.fullname,
                status: 'pending',
                answer: null,
                created_at: new Date().toISOString()
            }]);
            
            closeModal();
            alert('Поручение отправлено!');
        }
        
        async function loadEmployeePetri() {
            let { data: petri } = await supabase.from('petri').select().eq('employee_id', currentUser.id);
            let container = document.getElementById('petriList');
            container.innerHTML = '';
            
            if (!petri || petri.length === 0) {
                container.innerHTML = '<p>Нет чашек Петри</p>';
                return;
            }
            
            for (let p of petri) {
                container.innerHTML += `
                    <div class="card" style="padding:15px; margin-bottom:10px;">
                        📄 ${p.content}<br>
                        <small>${new Date(p.created_at).toLocaleString()}</small>
                    </div>
                `;
            }
        }
        
        async function savePetri() {
            let content = document.getElementById('petriInput').value.trim();
            if (!content) { alert('Введите описание'); return; }
            
            let petriId = crypto.randomUUID();
            await supabase.from('petri').insert([{
                id: petriId,
                employee_id: currentUser.id,
                content: content,
                created_at: new Date().toISOString()
            }]);
            
            document.getElementById('petriInput').value = '';
            loadEmployeePetri();
            alert('✅ Чашка Петри сохранена!');
        }
        
        function logout() {
            localStorage.removeItem('currentUser');
            currentUser = null;
            showMainMenu();
        }
        
        let savedUser = localStorage.getItem('currentUser');
        if (savedUser) {
            currentUser = JSON.parse(savedUser);
            currentLab = currentUser.lab_password;
            if (currentUser.role === 'admin') {
                document.getElementById('adminName').innerHTML = `👨‍⚕️ ${currentUser.fullname} | 🔑 ${currentLab}`;
                document.getElementById('adminPanel').classList.remove('hidden');
                document.getElementById('mainMenu').classList.add('hidden');
                loadEmployees();
            } else {
                document.getElementById('employeeName').innerHTML = `👩‍🔬 ${currentUser.fullname} | 🔑 ${currentLab}`;
                document.getElementById('employeePanel').classList.remove('hidden');
                document.getElementById('mainMenu').classList.add('hidden');
                loadEmployeePetri();
            }
        }
        
        window.showMainMenu = showMainMenu;
        window.showLogin = showLogin;
        window.showRegister = showRegister;
        window.doLogin = doLogin;
        window.doRegister = doRegister;
        window.addEmployee = addEmployee;
        window.showTaskModal = showTaskModal;
        window.sendTask = sendTask;
        window.savePetri = savePetri;
        window.logout = logout;
        window.toggleRegFields = toggleRegFields;
    </script>
</body>
</html>
